# ═══════════════════════════════════════════════════════════════════════════════
# Soter Guard — Nginx Reverse Proxy Config
# ═══════════════════════════════════════════════════════════════════════════════
# Install:  sudo ln -sf /etc/nginx/sites-available/soter-guard.conf /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# SSL:      sudo certbot --nginx -d YOUR_DOMAIN.com -d www.YOUR_DOMAIN.com
# Renew:    sudo certbot renew  # auto-renew via systemd timer
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Upstream: Next.js App (Docker: port 3000) ──────────────────────────────
upstream soter-app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ─── HTTP (port 80) → Redirect to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;  # ← Replace with your domain(s) e.g. soter.dev www.soter.dev

    client_max_body_size 100m;

    # Let's Encrypt ACME challenge (certbot verifies domain ownership)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (port 443) → Proxy to Next.js ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;  # ← Replace with your domain(s) e.g. soter.dev www.soter.dev

    # ── SSL Certificates (managed by Certbot) ─────────────────────────────
    # Certbot auto-updates these paths; we use a wildcard fallback so the
    # config works before running certbot for the first time.
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # ── Strong TLS Configuration ──────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    # ── Security Headers ──────────────────────────────────────────────────
    # HSTS (also set by Next.js, but defense-in-depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100m;

    # ── Proxy to Next.js App ──────────────────────────────────────────────
    location / {
        proxy_pass http://soter-app;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size   4k;
        proxy_buffers       8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ── WebSocket Support (for real-time features) ────────────────────────
    location /api/socket/ {
        proxy_pass http://soter-app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h for persistent WebSocket connections
    }
}
