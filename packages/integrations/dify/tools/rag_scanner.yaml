identity:
  name: rag_scanner
  author: SoterAI
  label:
    en_US: SoterAI RAG Scanner
    zh_Hans: SoterAI RAG Scanner
description:
  human:
    en_US: Scan documents and chunks for threats before adding to RAG/vector databases.
  llm: Scan document text for embedded threats before indexing into a vector database using the SoterAI API.
parameters:
  - name: text
    type: string
    required: true
    label:
      en_US: Document Text
    human_description:
      en_US: Document or chunk text to scan.
    llm_description: The document text to scan for embedded threats.
    form: llm
  - name: source_name
    type: string
    required: false
    label:
      en_US: Source Name
    human_description:
      en_US: Label for the document source (e.g. "uploaded-pdf").
    form: form
  - name: project_id
    type: string
    required: false
    label:
      en_US: Project ID
    form: form
